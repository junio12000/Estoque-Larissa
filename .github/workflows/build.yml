name: Build Flet APK

on: [push]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - uses: actions/setup-python@v5
        with:
          python-version: '3.10'
          
      - name: Install Flet
        run: pip install flet
        
      - name: Build APK
        run: yes y | flet build apk
        
      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: app-release
          # Este caminho busca qualquer arquivo .apk gerado na pasta build
          path: build/apk/**/*.apk
